<!DOCTYPE html><html><head><meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1600px;height:500px;overflow:hidden}
.banner{width:1600px;height:500px;position:relative;background:linear-gradient(105deg,#060807 52%,#0a130e 100%);overflow:hidden;font-family:"Chakra Petch",sans-serif}
.banner::before{content:"";position:absolute;inset:0;opacity:.55;
  background-image:linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px);
  background-size:50px 50px;-webkit-mask-image:radial-gradient(120% 100% at 80% 30%,#000,transparent 80%)}
.gw{position:absolute;right:-120px;top:-120px;width:620px;height:620px;border-radius:50%;background:radial-gradient(circle,rgba(69,240,138,.18),transparent 62%);filter:blur(4px)}
/* sparkline */
.spark{position:absolute;right:0;bottom:0;width:760px;height:360px;opacity:.6}
.content{position:absolute;left:300px;top:0;bottom:0;display:flex;flex-direction:column;justify-content:center;z-index:2;padding-right:40px}
.kick{font-family:"JetBrains Mono",monospace;font-weight:600;font-size:18px;letter-spacing:.34em;text-transform:uppercase;color:#45f08a;display:flex;align-items:center;gap:14px;margin-bottom:18px}
.kick .dot{width:9px;height:9px;border-radius:50%;background:#45f08a;box-shadow:0 0 12px #45f08a}
.name{font-weight:700;font-size:92px;line-height:.92;letter-spacing:-.01em;text-transform:uppercase;color:#f4f7f5}
.name b{color:#45f08a}
.tag{font-family:"JetBrains Mono",monospace;font-weight:500;font-size:24px;color:#aeb8b2;margin-top:18px;letter-spacing:.02em}
.tag b{color:#f4f7f5;font-weight:600}
.chips{display:flex;gap:12px;margin-top:26px;flex-wrap:wrap}
.chip{font-family:"JetBrains Mono",monospace;font-weight:600;font-size:15px;letter-spacing:.12em;text-transform:uppercase;color:#cfe9da;border:1px solid rgba(69,240,138,.4);background:rgba(69,240,138,.07);border-radius:100px;padding:8px 16px}
.br{position:absolute;width:40px;height:40px;border:2.5px solid rgba(69,240,138,.5)}
.br.tr{top:34px;right:34px;border-left:0;border-bottom:0}
.br.brr{bottom:34px;right:34px;border-left:0;border-top:0}
.coord{position:absolute;right:46px;top:46px;font-family:"JetBrains Mono",monospace;font-size:14px;letter-spacing:.18em;color:#717c76;text-align:right;z-index:2}
.coord b{color:#45f08a}
</style></head>
<body><div class="banner">
  <div class="gw"></div>
  <svg class="spark" viewBox="0 0 760 360" preserveAspectRatio="none">
    <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="rgba(69,240,138,.25)"/><stop offset="1" stop-color="rgba(69,240,138,0)"/></linearGradient></defs>
    <path d="M0,280 L90,260 L180,290 L270,230 L360,250 L450,180 L540,210 L630,120 L700,150 L760,70" fill="none" stroke="#45f08a" stroke-width="3"/>
    <path d="M0,280 L90,260 L180,290 L270,230 L360,250 L450,180 L540,210 L630,120 L700,150 L760,70 L760,360 L0,360 Z" fill="url(#g)"/>
  </svg>
  <div class="coord"><b>● LIVE</b><br>LOS ANGELES, CA</div>
  <div class="br tr"></div><div class="br brr"></div>
  <div class="content">
    <div class="kick"><span class="dot"></span> Operator // Builder // Trader</div>
    <div class="name">ROYALE <b>MULDREW</b></div>
    <div class="tag">One mind. Every business. <b>Powered by AI.</b></div>
    <div class="chips"><span class="chip">Credit</span><span class="chip">Trading</span><span class="chip">Funding</span><span class="chip">Dev</span><span class="chip">Business</span></div>
  </div>
</div></body></html>
