<!DOCTYPE html><html><head><meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:512px;height:512px;overflow:hidden}
.icon{width:512px;height:512px;position:relative;background:radial-gradient(75% 75% at 50% 42%,#0d1712,#060807 70%);display:grid;place-items:center;overflow:hidden}
.icon::before{content:"";position:absolute;inset:0;opacity:.5;
  background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);
  background-size:42px 42px;-webkit-mask-image:radial-gradient(60% 60% at 50% 50%,#000,transparent 78%)}
.glow{position:absolute;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,rgba(69,240,138,.30),transparent 65%);filter:blur(6px)}
.ring{position:absolute;width:392px;height:392px;border-radius:50%;border:1.5px solid rgba(69,240,138,.35)}
.ring.d{width:430px;height:430px;border-style:dashed;border-color:rgba(69,240,138,.18)}
.mono{position:relative;z-index:2;text-align:center}
.rm{font-family:"Chakra Petch",sans-serif;font-weight:700;font-size:185px;line-height:.86;color:#f4f7f5;letter-spacing:-.02em;text-shadow:0 0 50px rgba(69,240,138,.28)}
.rm b{color:#45f08a}
.tag{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:25px;letter-spacing:.42em;color:#45f08a;margin-top:14px;padding-left:.42em}
/* corner brackets */
.br{position:absolute;width:48px;height:48px;border:3px solid rgba(69,240,138,.55)}
.br.tl{top:40px;left:40px;border-right:0;border-bottom:0}
.br.tr{top:40px;right:40px;border-left:0;border-bottom:0}
.br.bl{bottom:40px;left:40px;border-right:0;border-top:0}
.br.brr{bottom:40px;right:40px;border-left:0;border-top:0}
</style></head>
<body><div class="icon">
  <div class="glow"></div><div class="ring d"></div><div class="ring"></div>
  <div class="br tl"></div><div class="br tr"></div><div class="br bl"></div><div class="br brr"></div>
  <div class="mono"><div class="rm">R<b>M</b></div><div class="tag">OPERATOR</div></div>
</div></body></html>
